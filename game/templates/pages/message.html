{% extends 'base.html' %} {% block content %}
<h1>{% block title %}{% endblock %}</h1>

{% if game_over %}
<p>{{ message }}</p>
<a href="{{ url_for('pages.home') }}">
  <button type="button">Return to menu</button>
</a>
{% elif game %}
<h2>{{ message }}</h2>
<a href="{{ url_for('pages.show_game', game_id=game.id) }}">
  <button type="button">Continue</button>
</a>
{% else %}
<h2>{{ message }}</h2>
{% endif %} {% endblock %}
