{% extends "base.html" %} {% block head %}
<h2>{% block title %}Main Menu{% endblock %}</h2>
{% endblock %} {% block content %}
<form method="POST" action="{{ url_for('game_routes.start_new_game') }}">
  <button type="submit">New Game</button>
</form>

<form method="GET" action="{{ url_for('game_routes.load_game') }}">
  <button type="submit">Load Game</button>
</form>

<form method="GET" action="{{ url_for('game_routes.quit_game') }}">
  <button type="submit">Quit</button>
</form>

{% endblock %}
